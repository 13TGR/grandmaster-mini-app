<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .error { color: #ff6666; }
        pre { background: #333; padding: 10px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h2>Отладка Карты Силы</h2>
    <div id="info">Инициализация...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (!user) {
            document.getElementById("info").innerHTML = '<span class="error">Ошибка: откройте приложение из Telegram</span>';
        } else {
            const userId = user.id;
            const API_URL = "https://script.google.com/macros/s/AKfycbxYR7PxhjZPCUYUT2PSWsigC5gvbgURMUzIuiHYjQ4ny1bRLMWeKEJ8k3eqNHgSOVtX/exec"; // ← СЮДА ВАШ URL

            document.getElementById("info").innerHTML = `Ваш Telegram ID: ${userId}<br>Загружаем данные из API...`;

            fetch(API_URL + "?user_id=" + userId)
                .then(response => {
                    if (!response.ok) throw new Error("Статус ответа: " + response.status);
                    return response.json();
                })
                .then(data => {
                    document.getElementById("info").innerHTML += 
                        `<br><b>Ответ API:</b><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    if (data.error) {
                        document.getElementById("info").innerHTML += '<span class="error">Пользователь не найден. Проверьте TelegramID в таблице.</span>';
                    }
                })
                .catch(error => {
                    document.getElementById("info").innerHTML += 
                        `<br><span class="error">Ошибка при запросе API:</span><br><pre>${error.message}</pre>`;
                });
        }
    </script>
</body>
</html>
