<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .bar {
            width: 80%;
            height: 30px;
            background: #333;
            margin: 10px auto;
            border-radius: 15px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            border-radius: 15px;
        }

        .water .fill {
            background: linear-gradient(90deg, #4444ff, #8888ff);
        }

        .tree .fill {
            background: linear-gradient(90deg, #44aa44, #88ff88);
        }

        .loader {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #1a1a1a;
            z-index: 9999;
        }

        .loader img {
            width: 140px;
            height: 140px;
        }
    </style>
</head>

<body>

    <div class="loader" id="loader">
        <img src="logo.webp" alt="Логотип Грандмастер">
    </div>

    <h1>🔥 Карта Силы</h1>

    <h2 id="childName">Загрузка...</h2>

    <p>Огонь <span id="fireVal">0%</span></p>
    <div class="bar">
        <div id="fireBar" class="fill" style="width:0%"></div>
    </div>

    <p>Вода <span id="waterVal">0%</span></p>
    <div class="bar water">
        <div id="waterBar" class="fill" style="width:0%"></div>
    </div>

    <p>Дерево <span id="treeVal">0%</span></p>
    <div class="bar tree">
        <div id="treeBar" class="fill" style="width:0%"></div>
    </div>

    <p><i id="coachMsg"></i></p>

    <script>
        const tg = window.Telegram.WebApp;

        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;

        if (!user) {
            document.body.innerHTML = "<h2>Ошибка: откройте приложение из Telegram</h2>";
        } else {

            const userId = user.id;

            const API_URL = "https://script.google.com/macros/s/AKfycbxYR7PxhjZPCUYUT2PSWsigC5gvbgURMUzIuiHYjQ4ny1bRLMWeKEJ8k3eqNHgSOVtX/exec";

            fetch(API_URL + "?user_id=" + userId)

                .then(r => r.json())

                .then(data => {

                    if (data.error) {
                        document.getElementById("childName").innerText = "Пользователь не найден";
                        return;
                    }

                    document.getElementById("childName").innerText = data.child;

                    document.getElementById("fireBar").style.width = data.fire + "%";
                    document.getElementById("fireVal").innerText = data.fire + "%";

                    document.getElementById("waterBar").style.width = data.water + "%";
                    document.getElementById("waterVal").innerText = data.water + "%";

                    document.getElementById("treeBar").style.width = data.tree + "%";
                    document.getElementById("treeVal").innerText = data.tree + "%";

                    document.getElementById("coachMsg").innerText = data.message;

                    document.getElementById("loader").style.display = "none";
                });
        }
    </script>

</body>
</html>
